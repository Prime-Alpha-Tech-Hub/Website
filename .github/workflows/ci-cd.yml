name: CI/CD — Prime Alpha Securities Website

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 — Lint
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: my-app/package-lock.json
      - name: Install dependencies
        working-directory: my-app
        run: npm ci
      - name: Run ESLint
        working-directory: my-app
        run: npx eslint src/ --ext .js,.jsx --max-warnings 100 || true

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 — Build frontend in CI, upload dist/ as artifact
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: my-app/package-lock.json
      - name: Install dependencies
        working-directory: my-app
        run: npm ci
      - name: Vite build
        working-directory: my-app
        run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: my-app/dist/
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# Stage 3 — Deploy to EC2  (main branch only)
# Syncs source + pre-built dist/ → EC2, installs server deps, restarts node
# No build step on EC2 — Vite is not required there
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      EC2_USER: ubuntu
      EC2_HOST: 18.175.223.159
      APP_DIR: /home/ubuntu/Prime-Alpha-Securities/my-app
      KEY: ${{ github.workspace }}/webkey.pem
    steps:
      - uses: actions/checkout@v4

      - name: Download built dist/
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: my-app/dist/

      - name: Fix key permissions
        run: chmod 600 "$KEY"

      - name: Sync source + dist to EC2
        run: |
          rsync -az \
            --exclude node_modules \
            --exclude .git \
            -e "ssh -i $KEY -o StrictHostKeyChecking=no -o ConnectTimeout=15" \
            my-app/ \
            $EC2_USER@$EC2_HOST:$APP_DIR/

      - name: Install server deps and restart on EC2
        run: |
          ssh -i "$KEY" -o StrictHostKeyChecking=no -o ConnectTimeout=15 $EC2_USER@$EC2_HOST << 'ENDSSH'
            set -e
            cd /home/ubuntu/Prime-Alpha-Securities/my-app
            echo "→ Installing server dependencies..."
            npm ci --omit=dev
            echo "→ Restarting server..."
            if sudo systemctl restart pas-website 2>/dev/null; then
              echo "  ✓ systemctl restarted"
            elif pm2 restart pas-website 2>/dev/null; then
              echo "  ✓ pm2 restarted"
            else
              pkill -f "node server.js" 2>/dev/null || true
              sleep 1
              nohup node server.js > /tmp/pas.log 2>&1 &
              echo "  ✓ server started via nohup (pid $!)"
            fi
            echo "Deploy complete."
          ENDSSH
