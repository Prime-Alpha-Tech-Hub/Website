name: CI/CD — Prime Alpha Securities Website

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 — Lint
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: my-app/package-lock.json
      - name: Install dependencies
        working-directory: my-app
        run: npm ci
      - name: Run ESLint
        working-directory: my-app
        run: npx eslint src/ --ext .js,.jsx --max-warnings 100 || true

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 — Build  (Vite smoke test)
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: my-app/package-lock.json
      - name: Install dependencies
        working-directory: my-app
        run: npm ci
      - name: Vite build
        working-directory: my-app
        run: npm run build

# ─────────────────────────────────────────────────────────────────────────────
# Stage 3 — Deploy to EC2  (main branch only)
# Requires: port 22 open in EC2 Security Group for 0.0.0.0/0
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      EC2_USER: ubuntu
      EC2_HOST: 18.175.223.159
      APP_DIR: /home/ubuntu/Prime-Alpha-Securities/my-app
      KEY: ${{ github.workspace }}/webkey.pem
    steps:
      - uses: actions/checkout@v4

      - name: Fix key permissions
        run: chmod 600 "$KEY"

      - name: Test SSH connectivity
        run: |
          ssh -i "$KEY" \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            -o BatchMode=yes \
            $EC2_USER@$EC2_HOST "echo SSH OK" \
          || { echo "❌ SSH failed — ensure port 22 is open in the EC2 Security Group for 0.0.0.0/0"; exit 1; }

      - name: Sync files to EC2
        run: |
          rsync -az \
            --exclude node_modules \
            --exclude .git \
            --exclude dist \
            -e "ssh -i $KEY -o StrictHostKeyChecking=no -o ConnectTimeout=15" \
            my-app/ \
            $EC2_USER@$EC2_HOST:$APP_DIR/

      - name: Install, build and restart on EC2
        run: |
          ssh -i "$KEY" -o StrictHostKeyChecking=no -o ConnectTimeout=15 $EC2_USER@$EC2_HOST "
            set -e
            cd $APP_DIR
            echo '→ Installing dependencies...'
            npm ci --omit=dev
            echo '→ Building frontend...'
            npm run build
            echo '→ Restarting server...'
            sudo systemctl restart pas-website 2>/dev/null && echo '  systemctl OK' && exit 0
            pm2 restart pas-website 2>/dev/null && echo '  pm2 OK' && exit 0
            pkill -f 'node server.js' 2>/dev/null; sleep 1
            nohup node server.js > /tmp/pas.log 2>&1 &
            echo '  server started (nohup)'
          "
        env:
          APP_DIR: /home/ubuntu/Prime-Alpha-Securities/my-app
