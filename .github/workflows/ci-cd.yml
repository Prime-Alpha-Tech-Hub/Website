name: CI/CD — Prime Alpha Securities Website

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 — Lint
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: my-app/package-lock.json
      - name: Install dependencies
        working-directory: my-app
        run: npm ci
      - name: ESLint
        working-directory: my-app
        run: npx eslint src/ --ext .js,.jsx --max-warnings 100 || true

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 — Build  (confirms the Vite compile is clean)
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: my-app/package-lock.json
      - name: Install dependencies
        working-directory: my-app
        run: npm ci
      - name: Vite build
        working-directory: my-app
        run: npm run build

# ─────────────────────────────────────────────────────────────────────────────
# Stage 3 — Deploy  (main branch only, no SSH required)
# Calls /api/deploy on the EC2 server over HTTP.
# The server pulls from GitHub, reinstalls deps, and restarts itself.
#
# Required GitHub secret: DEPLOY_TOKEN  (Settings → Secrets → Actions)
# Required on EC2: DEPLOY_TOKEN env var set in /etc/environment
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -sf -X POST \
            "http://18.135.45.32/api/deploy?token=${{ secrets.DEPLOY_TOKEN }}" \
            --max-time 30 \
          && echo "✓ Deploy triggered — EC2 is pulling latest code"
