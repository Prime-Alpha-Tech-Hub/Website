name: Deploy to EC2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/webkey.pem
          chmod 600 ~/.ssh/webkey.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Verify SSH Connection
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/webkey.pem \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
              "echo 'SSH connection successful' && uname -a"

      - name: Package Project
        run: |
          echo "📦 Preparing deployment package..."
          
          rm -rf build
          mkdir -p build
          
          rsync -av \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude .git \
            --exclude .gitignore \
            ./my-app/ build/
          
          echo "✅ Package prepared"

      - name: Upload to EC2
        run: |
          echo "📤 Uploading files to EC2..."
          
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/webkey.pem \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
              "mkdir -p ${{ secrets.APP_DIR }}"
          
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/webkey.pem -o StrictHostKeyChecking=no" \
            build/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.APP_DIR }}/

      - name: Run Deploy Script
        run: |
          echo "🚀 Running deployment script on EC2..."
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/webkey.pem \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
              "cd ${{ secrets.APP_DIR }} && \
               chmod +x deploy.sh && \
               sudo bash ./deploy.sh"

      - name: Cleanup SSH Key
        if: always()
        run: |
          rm -f ~/.ssh/webkey.pem
          rm -f ~/.ssh/known_hosts

      - name: Deployment Success
        if: success()
        run: echo "✅ Deployment to ${{ secrets.EC2_HOST }} completed successfully!"

      - name: Deployment Failure
        if: failure()
        run: echo "❌ Deployment failed! Check logs above."