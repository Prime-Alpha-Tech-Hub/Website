  EC2_USER: ubuntu
  EC2_HOST: ec2-18-130-159-18.eu-west-2.compute.amazonaws.com
  APP_DIR: /home/ubuntu/Prime-Alpha-Securities/my-app
  WORKSPACE_DIR: ./my-app

