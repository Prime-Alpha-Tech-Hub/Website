          chmod 600 ~/.ssh/webkey.pem
          ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Package Project
        run: |
          cd ${{ env.WORKSPACE_DIR }}
          echo "📦 Preparing deployment from ./my-app..."
          ls -la | head -15
          echo "✅ Files ready for deployment"

      - name: Verify SSH Connection
        run: |
          echo "🔗 Testing SSH connection..."
          ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -i ~/.ssh/webkey.pem \
              ${{ env.EC2_USER }}@${{ env.EC2_HOST }} \
              "echo '✅ SSH connection successful' && hostname && pwd"

      - name: Create Remote Directory
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -i ~/.ssh/webkey.pem \
              ${{ env.EC2_USER }}@${{ env.EC2_HOST }} \
              "mkdir -p ${{ env.APP_DIR }}"

      - name: Upload Files to EC2
        run: |
          echo "📤 Uploading files from ./my-app to EC2..."
          cd ${{ env.WORKSPACE_DIR }}

          rsync -avz --delete \
            -e "ssh -i ~/.ssh/webkey.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts" \
            . \
            ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:${{ env.APP_DIR }}/

          echo "✅ Files uploaded successfully"

      - name: Run Deploy Script
        run: |
          echo "🚀 Running deployment script..."
          ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -i ~/.ssh/webkey.pem \
              ${{ env.EC2_USER }}@${{ env.EC2_HOST }} \
              "cd ${{ env.APP_DIR }} && \
               chmod +x deploy.sh && \
               sudo bash ./deploy.sh"

      - name: Cleanup SSH Key
        if: always()
        run: |
          rm -f ~/.ssh/webkey.pem
          rm -f ~/.ssh/known_hosts

      - name: Deployment Status
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Deployment to ${{ env.EC2_HOST }} completed successfully!"
          else
            echo "❌ Deployment failed! Check logs above."
            exit 1
          fi
